name: Deploy alerts
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  deploy_dev:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Deploy to NAIS gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: alert_config_dev_gcp.yaml,runtime-alerts.yaml,security-alerts.yaml

  deploy_prod:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Deploy to NAIS on gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: alert_config_prod_gcp.yaml,runtime-alerts.yaml,security-alerts.yaml
